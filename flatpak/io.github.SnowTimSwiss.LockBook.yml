id: io.github.SnowTimSwiss.LockBook
runtime: org.gnome.Platform
runtime-version: "48"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: lockbook

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  # Lockbook reads/writes journal files anywhere the user picks, and shells out
  # to the host `timenc` CLI via flatpak-spawn --host.
  - --filesystem=host
  - --talk-name=org.freedesktop.Flatpak

modules:
  - name: lockbook
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin
      env:
        CARGO_HOME: /run/build/lockbook/cargo
      # Online build: cargo fetches crates during the build. This produces a
      # valid .flatpak artifact but is NOT Flathub-submission-ready (Flathub
      # requires offline/vendored sources via flatpak-cargo-generator).
      build-args:
        - --share=network
    build-commands:
      - "cargo build --release --manifest-path src-tauri/Cargo.toml"
      - "install -Dm755 src-tauri/target/release/lockbook /app/bin/lockbook"
      - "install -Dm644 flatpak/io.github.SnowTimSwiss.LockBook.desktop /app/share/applications/io.github.SnowTimSwiss.LockBook.desktop"
      - "install -Dm644 flatpak/io.github.SnowTimSwiss.LockBook.metainfo.xml /app/share/metainfo/io.github.SnowTimSwiss.LockBook.metainfo.xml"
      - "install -Dm644 src-tauri/icons/128x128.png /app/share/icons/hicolor/128x128/apps/io.github.SnowTimSwiss.LockBook.png"
      - "install -Dm644 src-tauri/icons/128x128@2x.png /app/share/icons/hicolor/256x256/apps/io.github.SnowTimSwiss.LockBook.png"
    sources:
      - type: dir
        path: ..
