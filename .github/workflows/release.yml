name: Release

on:
  release:
    types: [published] # fires on both release and pre-release

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
            artifact-name: lockbook-windows
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            artifact-name: lockbook-macos-universal
          - platform: ubuntu-22.04
            args: ""
            artifact-name: lockbook-linux

    runs-on: ${{ matrix.platform }}
    name: Build · ${{ matrix.artifact-name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # macOS universal binary needs both architectures
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Build & upload to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional: set TAURI_PRIVATE_KEY and TAURI_KEY_PASSWORD secrets
          # in your repo settings for auto-updater signing.
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Lockbook ${{ github.ref_name }}"
          releaseBody: |
            ## Lockbook ${{ github.ref_name }}

            Download the installer for your platform below.

            **Requires [TimENC CLI](https://github.com/SnowTimSwiss/TimENC/releases/latest) to be installed.**
          releaseDraft: false
          prerelease: ${{ github.event.release.prerelease }}
          args: ${{ matrix.args }}
